<!DOCTYPE html>
<html>
<head>
<title>Landing Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
}

header{
    height:70px;
    background:#111;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 50px;
}

.logo{
    font-size:25px;
    font-weight:bold;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:20px;
}


.hero{
    height:500px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:linear-gradient(120deg,#007bff,#00d4ff);
    color:white;
}

.hero h1{
    font-size:50px;
}

.hero p{
    margin:20px;
    font-size:20px;
}

.btn{
    background:white;
    color:#007bff;
    padding:12px 30px;
    border-radius:25px;
    text-decoration:none;
}

.features{
    padding:50px;
    display:flex;
    justify-content:center;
    gap:30px;
}

.card{
    background:white;
    width:250px;
    padding:30px;
    text-align:center;
    border-radius:15px;
    box-shadow:0 5px 15px #aaa;
}

.card h2{
    margin-bottom:15px;
}


footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
}

</style>

</head>

<body>

<header>
<div class="logo">MyBrand</div>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>
</header>


<section class="hero">

<div>
<h1>Welcome To Our Website</h1>

<p>Create amazing websites with HTML & CSS</p>

<a class="btn" href="#">Get Started</a>

</div>

</section>


<section class="features">

<div class="card">
<h2>Design</h2>
<p>Beautiful and creative layouts.</p>
</div>

<div class="card">
<h2>Code</h2>
<p>Clean HTML and CSS structure.</p>
</div>

<div class="card">
<h2>Launch</h2>
<p>Make your ideas live online.</p>
</div>

</section>


<footer>
<p>© 2026 MyBrand | All Rights Reserved</p>
</footer>


</body>
</html>
